name: Sync repository labels

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/sync-labels.yml

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
